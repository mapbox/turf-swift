version: 2.1

jobs:
  build_and_test_macos:
    parameters:
      xcode_version:
        type: string
    macos:
      xcode: << parameters.xcode_version >>
    steps:
      - checkout
      - run:
          name: "Build"
          command: xcodebuild -scheme Turf -configuration Debug -destination 'platform=macOS' build
      - run:
          name: "Test"
          command: xcodebuild -scheme Turf -configuration Debug -destination 'platform=macOS' test CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

  test_simulator:
    parameters:
      destination:
        type: string
    macos:
      xcode: 15.2.0
    resource_class: macos.m1.medium.gen1
    steps:
      - checkout
      - run:
          name: "Test << parameters.destination >>"
          command: |
            xcodebuild test \
              -scheme Turf \
              -destination "<< parameters.destination >>" \
              -derivedDataPath build

  pod_spec_lint:
    macos:
      xcode: 15.2.0
    steps:
    - checkout
    - run:
        name: "Lint podspec"
        command: pod spec lint

  create_xcframework:
    macos:
      xcode: 15.2.0
    steps:
      - checkout
      - add_ssh_keys:
          fingerprints:
            - SHA256:+N0Z68Xv4pWOYv57DqtnjGzkBtV5xcKJ48MIMVjgEUw
      - run:
          name: "Download distribution certificate for codesigning"
          command: |
            bundle install
            bundle exec fastlane setup_distribution_cert
      - run:
          name: "Build and create xcframework"
          command: ./scripts/xcframework.sh build/Turf.xcframework.zip
      - persist_to_workspace:
          root: .
          paths:
            - xcframework_checksum.txt

  build_for_library_evolution:
    macos:
      xcode: 15.1.0
    steps:
      - checkout
      - run:
          name: "Build for library evolution"
          command: xcodebuild -scheme Turf -configuration Release BUILD_LIBRARY_FOR_DISTRIBUTION=YES build

  sync_release:
    macos:
      xcode: 15.2.0
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: "Sync release branch"
          command: ./scripts/sync-release.sh
    
  release_job:
    macos:
      xcode: 15.2.0
    steps:
      - checkout
      - run:
          name: "Make release"
          command: ./scripts/draft-release.sh "$CIRCLE_TAG"

workflows:
  build-and-test:
    jobs:
      - create_xcframework
      - sync_release:
          filters:
            branches:
              only:
                - sapial/turf-release/0
          requires:
            - create_xcframework
      - build_for_library_evolution
      - build_and_test_macos:
          matrix:
            parameters:
              xcode_version: [14.3.1, 15.2.0]
      - test_simulator:
          matrix:
            parameters:
              destination:
                - "platform=visionOS Simulator,OS=1.0,name=Apple Vision Pro"
                - "platform=iOS Simulator,OS=17.2,name=iPhone 15"
      - pod_spec_lint
